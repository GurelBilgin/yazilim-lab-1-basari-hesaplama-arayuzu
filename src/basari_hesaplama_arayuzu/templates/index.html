<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci Bilgi Sistemi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
        }

        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-top: 50px;
        }

        h1 {
            font-size: 2.5rem;
            color: #007bff;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1rem;
            color: #6c757d;
            margin-bottom: 30px;
        }

        .btn {
            font-size: 1.1rem;
            padding: 15px 30px;
            width: 100%;
            margin-bottom: 15px;
            border-radius: 50px;
        }

        .btn-primary {
            background-color: #0069d9;
            border-color: #0062cc;
        }

        .btn-success {
            background-color: #28a745;
            border-color: #218838;
        }

        .btn-warning {
            background-color: #ffc107;
            border-color: #e0a800;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1 class="text-center">ÖĞRENCİ BİLGİ SİSTEMİ</h1>
        <p>Uygulamanıza başlamak için aşağıdaki seçeneklerden birini seçebilirsiniz.</p>
    
        <div class="d-grid gap-2">
            <!-- Program Çıktıları Sayfasına Git Butonu -->
            <a href="{{ url_for('program_ciktilari') }}" class="btn btn-primary">Program Çıktılarına Git</a>
            
            <!-- Ders Ekleme Butonu -->
            <a href="{{ url_for('ders_ekle') }}" class="btn btn-success">Ders Ekle</a>
            
            <!-- Öğrenci Listesi Butonu -->
            <a href="{{ url_for('ogrenci_listesi') }}" class="btn btn-warning">Öğrenci Listesi</a>
        </div>
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
</body>

</html>
