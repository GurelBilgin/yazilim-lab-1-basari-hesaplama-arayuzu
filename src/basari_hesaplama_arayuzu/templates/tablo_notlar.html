<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablo Notlar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <a href="{{ url_for('ders_detay', ders_kodu=ders['Ders Kodu']) }}" class="btn btn-secondary mb-3">Geri Dön</a>

        <h2>Not Yükleme ve Görüntüleme</h2>

        <!-- Mesaj Gösterme -->
        {% if mesaj %}
        <div class="alert alert-info">
            {{ mesaj }}
        </div>
        {% endif %}

        <!-- Excel Dosyası Yükleme Formu -->
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="excel_dosyasi" class="form-label">Excel Dosyasını Yükleyin</label>
                <input type="file" class="form-control" id="excel_dosyasi" name="excel_dosyasi" accept=".xls,.xlsx">
            </div>
            <button type="submit" class="btn btn-primary">Yükle</button>
        </form>

        <!-- Yüklenen Tabloyu Göster -->
        {% if tablo %}
        <div class="mt-4">
            <h3>Yüklenen Tablo</h3>
            <div>
                {{ tablo | safe }}
            </div>
        </div>
        {% endif %}

        <!-- Notları Kaydet Butonu -->
        {% if tablo %}
        <form method="POST">
            <button type="submit" name="save_json" class="btn btn-success mt-3">Notları Kaydet</button>
        </form>
        {% endif %}

        <!-- Excel Dosyasını İndir Linki -->
        <div class="mt-3">
            <!-- Excel dosyasını indirme butonu -->
            <a href="{{ url_for('download_excel', ders_kodu=ders['Ders Kodu']) }}" class="btn btn-info">
                Excel Dosyasını İndir
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.0/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
</body>
</html>
