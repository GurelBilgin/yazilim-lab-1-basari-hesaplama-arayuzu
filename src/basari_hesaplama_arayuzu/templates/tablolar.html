<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ders Tabloları</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Tablo butonlarının genel stilini belirleme */
        .btn-tablo {
            color: white;
            font-size: 18px;
            padding: 15px 30px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s, transform 0.3s;
            text-decoration: none;  /* Altı çizili yazıyı kaldır */
        }

        /* Tablo 1 butonu - Mavi */
        .btn-tablo-1 {
            background-color: #007bff;  /* Mavi */
        }

        .btn-tablo-1:hover {
            background-color: #0056b3;  /* Daha koyu mavi */
            transform: scale(1.05);  /* Büyütme efekti */
        }

        /* Tablo 2 butonu - Yeşil */
        .btn-tablo-2 {
            background-color: #28a745;  /* Yeşil */
        }

        .btn-tablo-2:hover {
            background-color: #218838;  /* Daha koyu yeşil */
            transform: scale(1.05);
        }

        /* Tablo 3 butonu - Kırmızı */
        .btn-tablo-3 {
            background-color: #dc3545;  /* Kırmızı */
        }

        .btn-tablo-3:hover {
            background-color: #c82333;  /* Daha koyu kırmızı */
            transform: scale(1.05);
        }

        /* Tablo 4 butonu - Turuncu */
        .btn-tablo-4 {
            background-color: #fd7e14;  /* Turuncu */
        }

        .btn-tablo-4:hover {
            background-color: #e67e00;  /* Daha koyu turuncu */
            transform: scale(1.05);
        }

        /* Tablo 5 butonu - Mor */
        .btn-tablo-5 {
            background-color: #6f42c1;  /* Mor */
        }

        .btn-tablo-5:hover {
            background-color: #5a32a3;  /* Daha koyu mor */
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <!-- Geri Dön Butonu -->
        <a href="{{ url_for('ders_detay', ders_kodu=ders['Ders Kodu']) }}" class="btn btn-secondary mb-3">Geri Dön</a>

        <h2>{{ ders['Ders Adı'] }} - Tablolar</h2>
        <p>{{ mesaj }}</p>

        <!-- Tablo Butonları -->
        <div class="d-grid gap-2">
            <a href="{{ url_for('tablo_detay', ders_kodu=ders['Ders Kodu'], tablo_id='1') }}" class="btn-tablo btn-tablo-1">Tablo 1</a>
            <a href="{{ url_for('tablo_detay', ders_kodu=ders['Ders Kodu'], tablo_id='2') }}" class="btn-tablo btn-tablo-2">Tablo 2</a>
            <a href="{{ url_for('tablo_detay', ders_kodu=ders['Ders Kodu'], tablo_id='3') }}" class="btn-tablo btn-tablo-3">Tablo 3</a>
            <a href="{{ url_for('tablo_detay', ders_kodu=ders['Ders Kodu'], tablo_id='4') }}" class="btn-tablo btn-tablo-4">Tablo 4</a>
            <a href="{{ url_for('tablo_detay', ders_kodu=ders['Ders Kodu'], tablo_id='5') }}" class="btn-tablo btn-tablo-5">Tablo 5</a>
        </div>
    </div>
</body>
</html>
