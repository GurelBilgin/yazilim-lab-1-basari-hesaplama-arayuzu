<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Tablo {{ tablo_id }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <!-- Tablolar sayfasına geri dönmek için buton -->
        <a href="{{ url_for('tablolar', ders_kodu=ders['Ders Kodu']) }}" class="btn btn-secondary mb-3">Geri Dön</a>

        <h2>{{ ders['Ders Adı'] }} - Tablo {{ tablo_id }}</h2>
        <p>{{ mesaj }}</p>

        
        

        <!-- Tablo yükleme formu -->
        <form method="POST" enctype="multipart/form-data" class="mt-4">
            <div class="mb-3">
                <label for="excel_tablo" class="form-label">Tablo {{ tablo_id }} Yükle</label>
                <input type="file" class="form-control" id="excel_tablo" name="excel_tablo">
            </div>
            <button type="submit" class="btn btn-primary">Yükle</button>
            <div class="mt-3"></div> <!-- Margin ile boşluk ekleniyor -->
            <!-- Tabloyu Göster -->
            <div>
                {% if tablo %}
                    {{ tablo|safe }}
                {% else %}
                    <p>Tablo henüz yüklenmedi.</p>
                {% endif %}
            </div>
        </form>
    </div>
</body>
</html>
